run_dir = "run"
mode = "local"
ncores = 1

molecules = [
    "neuraminidase-2BAT.pdb",
    "oseltamivir_zwitterion.pdb",
]

[topoaa]
autohis = true
autotoppar = true
delenph = false

# ligand_param_fname and ligand_top_fname are intentionally absent from
# [rigidbody] and [flexref]: they must be propagated automatically from
# topoaa's _output_params by WorkflowManager after prodrg runs.

[rigidbody]
ambig_fname = "ambig-active-rigidbody.tbl"
sampling = 4
tolerance = 20
w_vdw = 1.0

[seletop]
select = 2

[flexref]
ambig_fname = "ambig-passive.tbl"
tolerance = 20
mdsteps_rigid = 0
mdsteps_cool1 = 0

[caprieval]
reference_fname = "target.pdb"
