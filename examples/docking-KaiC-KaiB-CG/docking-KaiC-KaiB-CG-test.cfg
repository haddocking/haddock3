# ====================================================================
# Protein-protein docking example with NMR-derived ambiguous interaction restraints
# ====================================================================

# directory in which the scoring will be done
run_dir = "run1-CG-test"

# execution mode
mode = "local"
ncores = 10

# molecules to be docked
molecules =  [
    "data/3DVL_A-trunc_1.pdb",
    "data/5JYT_B-trunc_1.pdb",
    "data/5JYT_C-trunc_1.pdb",
    "data/5JYT_D-trunc_1.pdb",
    "data/5JYT_E-trunc_1.pdb",
    "data/5JYT_F-trunc_1.pdb",
    "data/5JYT_G-trunc_1.pdb"
    ]

postprocess = True 
debug = True

# ====================================================================
# Parameters for each stage are defined below, prefer full paths
# ====================================================================

[topoaa]

[topocg]
cgffversion = "martini2"

[rigidbody]
crossdock = False
ambig_fname = "data/ambig.tbl"
#unambig_fname = "data/unambig.tbl"
symtbl_fname = "data/custom_sym_restraints.tbl"
randremoval = False
tolerance = 5
sampling = 10
ntrials = 1
rotate180 = False
# defining "C6" symmetry restraints
sym_on = True
c2sym_sta1_1=20
c2sym_end1_1=90
c2sym_seg1_1="B"
c2sym_sta2_1=20
c2sym_end2_1=90
c2sym_seg2_1="E"
c2sym_sta1_2=20
c2sym_end1_2=90
c2sym_seg1_2="C"
c2sym_sta2_2=20
c2sym_end2_2=90
c2sym_seg2_2="F"
c2sym_sta1_3=20
c2sym_end1_3=90
c2sym_seg1_3="D"
c2sym_sta2_3=20
c2sym_end2_3=90
c2sym_seg2_3="G"
c3sym_sta1_1=20
c3sym_end1_1=90
c3sym_seg1_1="B"
c3sym_sta2_1=20
c3sym_end2_1=90
