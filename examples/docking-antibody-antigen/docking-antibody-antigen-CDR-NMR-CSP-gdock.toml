# ====================================================================
# Protein-protein docking example with NMR-derived ambiguous interaction restraints
#
# NOTE: Sampling is performed with gdock instead of rigidbody
#
run_dir = "run1-CDR-NMR-CSP-gdock"
ncores = 16
molecules = ["data/4G6K_fv.pdb", "data/4I1B-matched.pdb"]
# ====================================================================
# Generate CNS-compatible topology and parameters for all input molecules.
[topoaa]
#--------------------------------------------------------------------#
# Sample docking conformations using a genetic algorithm.
[gdock]
ambig_fname = "data/ambig-CDR-NMR-CSP.tbl"
sampling = 1000
#--------------------------------------------------------------------#
# Evaluate the gdock models against the reference structure.
[caprieval]
reference_fname = "data/4G6M-matched.pdb"
#--------------------------------------------------------------------#
# Select the top-scoring models for downstream refinement.
[seletop]
select = 200
#--------------------------------------------------------------------#
# Re-evaluate after top-model selection.
["caprieval.1"]
reference_fname = "data/4G6M-matched.pdb"
#--------------------------------------------------------------------#
# Refine docking models with flexible backbone and side chains.
[flexref]
tolerance = 5
ambig_fname = "data/ambig-CDR-NMR-CSP.tbl"
unambig_fname = "data/unambig.tbl"
#--------------------------------------------------------------------#
# Evaluate models after flexible refinement.
["caprieval.2"]
reference_fname = "data/4G6M-matched.pdb"
#--------------------------------------------------------------------#
# Final energy minimization to remove clashes and optimize geometry.
[emref]
tolerance = 5
ambig_fname = "data/ambig-CDR-NMR-CSP.tbl"
unambig_fname = "data/unambig.tbl"
#--------------------------------------------------------------------#
# Evaluate models after energy minimization.
["caprieval.3"]
reference_fname = "data/4G6M-matched.pdb"
#--------------------------------------------------------------------#
# Cluster models by fraction of common contacts (FCC).
[clustfcc]
#--------------------------------------------------------------------#
# Select the best-scoring models from each cluster.
[seletopclusts]
top_models = 4
#--------------------------------------------------------------------#
# Final evaluation of cluster representatives.
["caprieval.4"]
reference_fname = "data/4G6M-matched.pdb"
# ====================================================================
