#====================================================================
# Protein-ligand docking example

# directory in which the scoring will be done
run_dir = "run1-test-mem-one-side"

# execution mode
mode = "local"
ncores = 50

# molecules to be docked
molecules =  [
    "data/3x29_unbound-full_A_dppc-atomistic.pdb",
    "data/3x29_unbound_B.pdb"
    ]

# ====================================================================
# Parameters for each stage are defined below
# ====================================================================
[topoaa]
log_level = "verbose"
autohis = true
delenph = true

[rigidbody]
tolerance = 20
ambig_fname = "data/ambig-actB-passA-oneside.tbl"
unambig_fname = "data/unambig.tbl"
mol_fix_origin_1 = true
membrane = true
memchain = "A"
memside = "151"

[caprieval]
reference_fname = 'data/3x29_bound.pdb'

[seletop]
select = 200

[flexref]
tolerance = 20
ambig_fname = "data/ambig-actB-passA-oneside.tbl"
unambig_fname = "data/unambig.tbl"
mdsteps_rigid = 0
mdsteps_cool1 = 0

[caprieval]
reference_fname = 'data/3x29_bound.pdb'

[emref]
tolerance = 20
ambig_fname = "data/ambig-actB-passA-oneside.tbl"
unambig_fname = "data/unambig.tbl"

[caprieval]
reference_fname = 'data/3x29_bound.pdb'

[clustfcc]
min_population = 4

[seletopclusts]
top_models = 4

[caprieval]
reference_fname = 'data/3x29_bound.pdb'

# ====================================================================
