# ====================================================================
# Protein-protein docking example with NMR-derived ambiguous interaction restraints
# ====================================================================

# directory in which the scoring will be done
run_dir = "run1-full-CG"

# execution mode
mode = "batch"
queue = "short"
queue_limit = 400
ncores = 10

# molecules to be docked
molecules =  [
    "data/3lz0_merged_A.pdb",
    "data/3rpg_clean.pdb"
    ]

postprocess = True 
debug = True

# ====================================================================
# Parameters for each stage are defined below, prefer full paths
# ====================================================================

[topoaa]

[topocg]
cgffversion = "martini2"

[rigidbody]
ambig_fname = "data/ambig.tbl"
unambig_fname = "data/unambig.tbl"
randremoval = False
tolerance = 10
sampling = 1000

[caprieval]
reference_fname = "data/4r8p_reference.pdb"
fnat_cutoff = 7.0 # cutoff for coarse-grained structures

[seletop]
select = 200

[caprieval]
reference_fname = "data/4r8p_reference.pdb"
fnat_cutoff = 7.0 # cutoff for coarse-grained structures

[flexref]
ambig_fname = "data/ambig.tbl"
unambig_fname = "data/unambig.tbl"
randremoval = False
tolerance = 5

[caprieval]
reference_fname = "data/4r8p_reference.pdb"
fnat_cutoff = 7.0 # cutoff for coarse-grained structures

[cgtoaa]

[emref]
ambig_fname = "data/ambig.tbl"
unambig_fname = "data/unambig.tbl"
randremoval = False
tolerance = 5

[caprieval]
reference_fname = "data/4r8p_reference.pdb"

[clustfcc]

[seletopclusts]

[caprieval]
reference_fname = "data/4r8p_reference.pdb"

# ====================================================================
