# HADDOCK3 Cross-docking: Model 110
# Protocol: Binding Site Residues approach - RIGID LIGAND
# Ligand pre-placed at BS centroid
run_dir = "run1-centered-test"
ncores = 10

molecules = [
    "./data/receptor.pdb",
    "./data/ligand_centered.pdb"
]

# ===========================================
# Topology generation
# ===========================================
[topoaa]
ligand_param_fname = "./data/ligand.param"
ligand_top_fname = "./data/ligand.top"
delenph = false
autohis = true

[rigidbody]
sampling = 5
tolerance = 20
separate = false
randrot = true
ambig_fname = "./data/ambig_active.tbl"
w_vdw = 0.0
inter_rigid = 0.001
mol_fix_origin_1 = true
randremoval = false
ligand_param_fname = "./data/ligand.param"
ligand_top_fname = "./data/ligand.top"

[caprieval]
reference_fname = "./data/reference.pdb"
irmsd_cutoff = 3.5

[seletop]
select = 2

[caprieval]
reference_fname = "./data/reference.pdb"
irmsd_cutoff = 3.5

[flexref]
tolerance = 50
ambig_fname = "./data/ambig_passive.tbl"
ligand_param_fname = "./data/ligand.param"
ligand_top_fname = "./data/ligand.top"
mdsteps_rigid = 0
mdsteps_cool1 = 0
randremoval = false

[caprieval]
reference_fname = "./data/reference.pdb"
irmsd_cutoff = 3.5

[ilrmsdmatrix]

[clustrmsd]
criterion = 'distance'
linkage = 'average'
min_population = 1
clust_cutoff = 1.5

[seletopclusts]
top_models = 4

[caprieval]
reference_fname = "./data/reference.pdb"
irmsd_cutoff = 3.5

# ====================================================================
