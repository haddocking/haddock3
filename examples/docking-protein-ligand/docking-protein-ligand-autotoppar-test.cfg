# ===============================================================#
# Protein-ligand docking with automatic ligand toppar generation #
# ===============================================================#
run_dir = "run1-autotoppar"
mode = "local"
ncores = 40
molecules =  [
    "data/neuraminidase-2BAT.pdb",
    "data/oseltamivir_zwitterion.pdb"
    ]
[topoaa]
autohis = true
autotoppar = true
delenph = false
[rigidbody]
tolerance = 20
ambig_fname = "data/ambig-active-rigidbody.tbl"
sampling = 20
w_vdw = 1.0
[caprieval]
reference_fname = 'data/target.pdb'
[seletop]
select = 5
[flexref]
tolerance = 20
ambig_fname = "data/ambig-passive.tbl"
mdsteps_rigid = 0
mdsteps_cool1 = 0
[caprieval]
reference_fname = 'data/target.pdb'
[rmsdmatrix]
resdic_A = [151,152,348,276,156,292,277,222,371,246,406,179,178,227,294,224,119,118]
resdic_B = [500]
[clustrmsd]
criterion = "maxclust"
n_clusters = 2
[seletopclusts]
top_models = 4
[caprieval]
reference_fname = 'data/target.pdb'
[caprieval]
allatoms = true
reference_fname = "data/target.pdb"
