# ====================================================================
# Protein-peptide docking example
#
# NOTE: Sampling is performed with gdock instead of rigidbody
#
run_dir = "run1-gdock"
ncores = 16
molecules = ["data/1NX1_protein.pdb", "data/DAIDALSSDFT_3conformations.pdb"]
# ====================================================================
# Generate CNS-compatible topology and parameters for all input molecules.
[topoaa]
autohis = false
[topoaa.mol1]
nhisd = 2
hisd_1 = 36
hisd_2 = 109
nhise = 1
hise_1 = 113
#--------------------------------------------------------------------#
# Sample docking conformations using a genetic algorithm.
[gdock]
ambig_fname = "data/ambig.tbl"
sampling = 3000
#--------------------------------------------------------------------#
# Evaluate the gdock models against the reference structure.
[caprieval]
reference_fname = "data/1nx1_refe.pdb"
#--------------------------------------------------------------------#
# Select the top-scoring models for downstream refinement.
[seletop]
select = 400
#--------------------------------------------------------------------#
# Re-evaluate after top-model selection.
["caprieval.1"]
reference_fname = "data/1nx1_refe.pdb"
#--------------------------------------------------------------------#
# Refine docking models with flexible backbone and side chains.
[flexref]
tolerance = 5
ambig_fname = "data/ambig.tbl"
# Define peptide as fully flexible
fle_sta_1 = 1
fle_end_1 = 11
fle_seg_1 = "B"
# Define automatically dihedral restraints
# for alpha and beta secondary structure elements
ssdihed = "alphabeta"
# Increased number of refinement steps
mdsteps_rigid = 2000
mdsteps_cool1 = 2000
mdsteps_cool2 = 4000
mdsteps_cool3 = 4000
#--------------------------------------------------------------------#
# Evaluate models after flexible refinement.
["caprieval.2"]
reference_fname = "data/1nx1_refe.pdb"
#--------------------------------------------------------------------#
# Final energy minimization to remove clashes and optimize geometry.
[emref]
tolerance = 5
ambig_fname = "data/ambig.tbl"
# Define peptide as fully flexible
fle_sta_1 = 1
fle_end_1 = 11
fle_seg_1 = "B"
# Define automatically dihedral restraints
# for alpha and beta secondary structure elements
ssdihed = "alphabeta"
#--------------------------------------------------------------------#
# Evaluate models after energy minimization.
["caprieval.3"]
reference_fname = "data/1nx1_refe.pdb"
#--------------------------------------------------------------------#
# Cluster models by fraction of common contacts (FCC).
[clustfcc]
#--------------------------------------------------------------------#
# Select the best-scoring models from each cluster.
[seletopclusts]
top_models = 4
#--------------------------------------------------------------------#
# Final evaluation of cluster representatives.
["caprieval.4"]
reference_fname = "data/1nx1_refe.pdb"
#--------------------------------------------------------------------#
# Final evaluation including all side-chain atoms for a complete quality assessment.
["caprieval.5"]
allatoms = true
reference_fname = "data/1nx1_refe.pdb"
# ====================================================================
