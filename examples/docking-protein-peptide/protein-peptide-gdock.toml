# ====================================================================
# Protein-peptide docking example
# NOTE: Sampling is performed with gdock instead of rigidbody
run_dir = "run1-gdock"
ncores = 16
molecules = ["data/1NX1_protein.pdb", "data/DAIDALSSDFT_3conformations.pdb"]
# ====================================================================
[topoaa]
autohis = false
[topoaa.mol1]
nhisd = 2
hisd_1 = 36
hisd_2 = 109
nhise = 1
hise_1 = 113

[gdock]
ambig_fname = "data/ambig.tbl"
sampling = 3000

[caprieval]
reference_fname = "data/1nx1_refe.pdb"

[seletop]
select = 400

[caprieval.1]
reference_fname = "data/1nx1_refe.pdb"

[flexref]
tolerance = 5
ambig_fname = "data/ambig.tbl"
# Define peptide as fully flexible
fle_sta_1 = 1
fle_end_1 = 11
fle_seg_1 = "B"
# Define automatically dihedral restraints
# for alpha and beta secondary structure elements
ssdihed = "alphabeta"
# Increased number of refinement steps
mdsteps_rigid = 2000
mdsteps_cool1 = 2000
mdsteps_cool2 = 4000
mdsteps_cool3 = 4000

[caprieval.2]
reference_fname = "data/1nx1_refe.pdb"

[emref]
tolerance = 5
ambig_fname = "data/ambig.tbl"
# Define peptide as fully flexible
fle_sta_1 = 1
fle_end_1 = 11
fle_seg_1 = "B"
# Define automatically dihedral restraints
# for alpha and beta secondary structure elements
ssdihed = "alphabeta"

[caprieval.3]
reference_fname = "data/1nx1_refe.pdb"

[clustfcc]

[seletopclusts]
top_models = 4

[caprieval.4]
reference_fname = "data/1nx1_refe.pdb"

# Running final caprieval with allatoms parameter set to true to also
#  include the evaluation of protein & peptide side chains,
#  in both the alignment process and irmsd, ilrmsd computations
[caprieval.5]
allatoms = true
reference_fname = "data/1nx1_refe.pdb"

# ====================================================================
