# ====================================================================
# Protein-protein docking example with NMR-derived ambiguous interaction restraints

# directory in which the scoring will be done
run_dir = "run1-full"

# execution mode
mode = "local"
ncores = 40

# molecules to be docked
molecules =  [
    "data/proteinA.pdb",
    "data/proteinB.pdb",
    "data/shape.pdb",
    ]

# ====================================================================
# Parameters for each stage are defined below, prefer full paths
# ====================================================================
[topoaa]

[rigidbody]
tolerance = 20
ambig_fname = "data/ambig-shape.tbl"

[caprieval]
reference_fname = "data/3k3k_reference.pdb"

[seletop]

[flexref]
tolerance = 20
ambig_fname = "data/ambig-shape.tbl"

[caprieval]
reference_fname = "data/3k3k_reference.pdb"

[emref]
tolerance = 20
ambig_fname = "data/ambig-shape.tbl"

[clustfcc]
min_population = 4

[seletopclusts]
top_models = 4

[caprieval]
reference_fname = "data/3k3k_reference.pdb"

# ====================================================================

