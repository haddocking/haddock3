# ====================================================================
# Protein-protein docking example with shape restraints

# directory in which the scoring will be done
run_dir = "run1-full"

# execution mode
mode = "local"
ncores = 50

# molecules to be docked
molecules =  [
    "data/2r15_A.pdb",
    "data/2r15_B.pdb",
    "data/shape.pdb",
    ]

# ====================================================================
# Parameters for each stage are defined below, prefer full paths
# ====================================================================
[topoaa]

[rigidbody]
tolerance = 20
ambig_fname = "data/ambig-shape.tbl"
mol_shape_3 = true
mol_fix_origin_3 = true

[caprieval]
reference_fname = "data/2r15_reference.pdb"

[seletop]

[flexref]
tolerance = 20
ambig_fname = "data/ambig-shape.tbl"
mol_shape_3 = true
mol_fix_origin_3 = true

[caprieval]
reference_fname = "data/2r15_reference.pdb"

[emref]
tolerance = 20
ambig_fname = "data/ambig-shape.tbl"
mol_shape_3 = true
mol_fix_origin_3 = true

[caprieval]
reference_fname = "data/2r15_reference.pdb"

[clustfcc]
min_population = 4

[seletopclusts]
top_models = 4

[caprieval]
reference_fname = "data/2r15_reference.pdb"

# ====================================================================

