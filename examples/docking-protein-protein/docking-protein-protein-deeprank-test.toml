# ====================================================================
# Protein-protein docking example with NMR-derived ambiguous 
#  interaction restraints
# ====================================================================
run_dir = "run1-deeprank-test"
ncores = 16
molecules = ["data/e2aP_1F3G.pdb", "data/hpr_ensemble.pdb"]
#####################################################################
[topoaa]
autohis = false
mol1 = { nhisd = 0, nhise = 1, hise_1 = 75 }
mol2 = { nhisd = 1, hisd_1 = 76, nhise = 1, hise_1 = 15 }
#####################################################################
[rigidbody]
tolerance = 5
ambig_fname = "data/e2a-hpr_air.tbl"
sampling = 20
#####################################################################
[caprieval]
reference_fname = "data/e2a-hpr_1GGR.pdb"
#####################################################################
[deeprank]
chain_i = "A"
chain_j = "B"
#####################################################################
[caprieval]
reference_fname = "data/e2a-hpr_1GGR.pdb"
#####################################################################
[seletop]
select = 5
#####################################################################
[caprieval]
reference_fname = "data/e2a-hpr_1GGR.pdb"
#####################################################################
[flexref]
tolerance = 5
ambig_fname = "data/e2a-hpr_air.tbl"
#####################################################################
[caprieval]
reference_fname = "data/e2a-hpr_1GGR.pdb"
#####################################################################
[emref]
tolerance = 5
ambig_fname = "data/e2a-hpr_air.tbl"
#####################################################################
[caprieval]
reference_fname = "data/e2a-hpr_1GGR.pdb"
#####################################################################
[clustfcc]
#####################################################################
[seletopclusts]
top_models = 4
#####################################################################
[caprieval]
reference_fname = "data/e2a-hpr_1GGR.pdb"
#####################################################################
[deeprank]
chain_i = "A"
chain_j = "B"
#####################################################################
[caprieval]
reference_fname = "data/e2a-hpr_1GGR.pdb"
#####################################################################
