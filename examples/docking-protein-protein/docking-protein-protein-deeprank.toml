# ====================================================================
# Protein-protein docking example with NMR-derived ambiguous 
#  interaction restraints
# ====================================================================
run_dir = "run1-full"
ncores = 16
molecules = ["data/e2aP_1F3G.pdb", "data/hpr_ensemble.pdb"]
#####################################################################
[topoaa]
autohis = false
mol1 = { nhisd = 0, nhise = 1, hise_1 = 75 }
mol2 = { nhisd = 1, hisd_1 = 76, nhise = 1, hise_1 = 15 }
#####################################################################
[rigidbody]
tolerance = 5
ambig_fname = "data/e2a-hpr_air.tbl"
sampling = 1000
#####################################################################
["caprieval.1"]
reference_fname = "data/e2a-hpr_1GGR.pdb"
#####################################################################
[deeprank]
chain_i = "A"
chain_j = "B"
#####################################################################
[seletop]
select = 200
#####################################################################
["caprieval.2"]
reference_fname = "data/e2a-hpr_1GGR.pdb"
#####################################################################
[flexref]
tolerance = 5
ambig_fname = "data/e2a-hpr_air.tbl"
#####################################################################
["caprieval.3"]
reference_fname = "data/e2a-hpr_1GGR.pdb"
#####################################################################
[emref]
tolerance = 5
ambig_fname = "data/e2a-hpr_air.tbl"
#####################################################################
["caprieval.4"]
reference_fname = "data/e2a-hpr_1GGR.pdb"
#####################################################################
[clustfcc]
#####################################################################
[seletopclusts]
top_models = 4
#####################################################################
["caprieval.5"]
reference_fname = "data/e2a-hpr_1GGR.pdb"
#####################################################################
