# ====================================================================
# Protein-protein docking example with NMR-derived ambiguous interaction restraints
# NOTE: Sampling is performed with gdock instead of rigidbody
run_dir = "run1-gdock"
ncores = 16
molecules = ["data/e2aP_1F3G.pdb", "data/hpr_ensemble.pdb"]
# ====================================================================
[topoaa]
autohis = false
[topoaa.mol1]
nhisd = 0
nhise = 1
hise_1 = 75
[topoaa.mol2]
nhisd = 1
hisd_1 = 76
nhise = 1
hise_1 = 15
#--------------------------------------------------------------------#
[gdock]
ambig_fname = "data/e2a-hpr_air.tbl"
sampling = 1000
#--------------------------------------------------------------------#
[caprieval]
reference_fname = "data/e2a-hpr_1GGR.pdb"
#--------------------------------------------------------------------#
[seletop]
select = 200
#--------------------------------------------------------------------#
[caprieval.1]
reference_fname = "data/e2a-hpr_1GGR.pdb"
#--------------------------------------------------------------------#
[flexref]
tolerance = 5
ambig_fname = "data/e2a-hpr_air.tbl"
#--------------------------------------------------------------------#
[caprieval.2]
reference_fname = "data/e2a-hpr_1GGR.pdb"
#--------------------------------------------------------------------#
[emref]
tolerance = 5
ambig_fname = "data/e2a-hpr_air.tbl"
#--------------------------------------------------------------------#
[caprieval.3]
reference_fname = "data/e2a-hpr_1GGR.pdb"
#--------------------------------------------------------------------#
[clustfcc]
#--------------------------------------------------------------------#
[seletopclusts]
top_models = 4
#--------------------------------------------------------------------#
[caprieval.4]
reference_fname = "data/e2a-hpr_1GGR.pdb"
# ====================================================================
