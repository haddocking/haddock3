reference_fname:
  default: ''
  type: file
  title: Reference structure
  short: Reference structure for RMSD calculation.
  long: Path to the reference PDB structure used when calculating the global RMSD.
    This parameter is mandatory — the module will stop with an error if it is not set.
  group: analysis
  explevel: easy

threshold:
  default: 5.0
  type: float
  min: 0.0
  max: 99999.99
  precision: 3
  title: RMSD threshold, Å
  short: Models with RMSD above this value are filtered out.
  long: Models with a global RMSD above this threshold with respect to the
    reference structure are filtered out. If all models exceed the threshold the
    workflow will stop with an error message.
  group: analysis
  explevel: easy

alignment_method:
  default: sequence
  type: string
  minchars: 0
  maxchars: 100
  choices:
    - sequence
    - structure
  title: Alignment method
  short: Alignment method used to match residue numbering between model and reference.
  long: Alignment method used to match residue numbering between model and reference.
    sequence alignment is the default and works well for most cases. structure
    alignment requires a LovoAlign executable to be provided via lovoalign_exec.
  group: analysis
  explevel: easy

sortby:
  default: rmsd
  type: string
  minchars: 0
  maxchars: 10
  choices:
    - rmsd
    - score
  title: Sort output models in the output file by this value
  short: Column used to sort the output TSV.
  long: Column used to sort the output TSV. Use rmsd (default) to sort by global
    RMSD ascending. Use score to sort by model score if available; falls back to
    rmsd if no model carries a valid score.
  group: analysis
  explevel: easy

sort_ascending:
  default: true
  type: boolean
  title: Sort in ascending order
  short: Sort the output TSV in ascending order.
  long: Sort the output TSV in ascending order.
  group: analysis
  explevel: easy

allatoms:
  default: false
  type: boolean
  title: Use all heavy atoms
  short: Use all heavy atoms (including side chains) for RMSD calculation.
  long: If false (default), only backbone atoms (CA, C, N, O) are used for the
    RMSD calculation. If true, all heavy atoms including side chains are used.
  group: analysis
  explevel: easy

keep_hetatm:
  default: false
  type: boolean
  title: Consider HETATM records
  short: Include HETATM atoms from the reference during coordinate loading.
  long: If false (default), only ATOM coordinate lines are used. If true, HETATM
    records from the reference are also included.
  group: analysis
  explevel: easy

lovoalign_exec:
  default: ''
  type: string
  minchars: 0
  maxchars: 200
  title: LovoAlign executable path
  short: Path to the LovoAlign executable.
  long: Path to the LovoAlign executable. Only required when alignment_method is
    set to structure.
  group: analysis
  explevel: easy


