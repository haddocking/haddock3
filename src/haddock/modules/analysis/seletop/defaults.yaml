select:
  default: 200
  type: integer
  min: 1
  max: 50000
  title: Number of best-ranked models to select
  short: Number of best-ranked models to select for further steps of the workflow
  long: Number of best-ranked models to select for further steps of the workflow. Typically only 200 models produced at the rigid-body docking stage are selected for further refinement.
  group: analysis
  explevel: easy
sort_ascending:
  default: true
  type: boolean
  title: Sort in ascending order
  short: Sort in ascending order.
  long: Sort in ascending order.
  group: analysis
  explevel: easy
