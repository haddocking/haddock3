chain_i:
  default: "A"
  type: string
  minchars: 1
  maxchars: 1
  title: First chain ID
  short: Chain ID of the first partner.
  long: Chain ID of the first partner used by deeprank for scoring.
  group: "scoring"
  explevel: easy
chain_j:
  default: "B"
  type: string
  minchars: 1
  maxchars: 1
  title: Second chain ID
  short: Chain ID of the second partner.
  long: Chain ID of the second partner used by deeprank for scoring.
  group: "scoring"
  explevel: easy
flip_score:
  default: true
  type: boolean
  title: Flip the sign of the predicted score
  short: Negate deeprank's predicted fnat so lower is better.
  long: Deeprank predicts a fraction of native contacts (fnat) between 0 and
    1, where 1 is the best score. The rest of the HADDOCK3 pipeline (e.g.
    caprieval, ranking) assumes lower scores are better, so by default the
    predicted score is negated to match that convention.
  group: "scoring"
  explevel: easy
